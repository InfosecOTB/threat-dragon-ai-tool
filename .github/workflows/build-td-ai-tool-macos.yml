name: Build macOS app

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-macos-arm64:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build with PyInstaller on macOS arm64
        shell: bash
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

          python -m PyInstaller \
            --noconfirm \
            --clean \
            --onefile \
            --windowed \
            --noupx \
            --target-arch arm64 \
            --name "td-ai-tool" \
            --icon "assets/favicon.icns" \
            --add-data "assets:assets" \
            --add-data "prompt.txt:." \
            --collect-all ttkbootstrap \
            --collect-all litellm \
            --hidden-import "tiktoken_ext.openai_public" \
            src/main.py

      - name: Show dist contents
        shell: bash
        run: ls -la dist

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: td-ai-tool-macos-arm64
          path: |
            dist/td-ai-tool
            dist/td-ai-tool.app

  build-macos-x64:
    runs-on: macos-15-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build with PyInstaller on macOS x86_64
        shell: bash
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

          python -m PyInstaller \
            --noconfirm \
            --clean \
            --onefile \
            --windowed \
            --noupx \
            --target-arch x86_64 \
            --name "td-ai-tool" \
            --icon "assets/favicon.icns" \
            --add-data "assets:assets" \
            --add-data "prompt.txt:." \
            --collect-all ttkbootstrap \
            --collect-all litellm \
            --hidden-import "tiktoken_ext.openai_public" \
            src/main.py

      - name: Show dist contents
        shell: bash
        run: ls -la dist

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: td-ai-tool-macos-x64
          path: |
            dist/td-ai-tool
            dist/td-ai-tool.app
